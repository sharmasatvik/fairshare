version: "3.8"

# Kafka runs in KRaft mode (no Zookeeper), simpler for a local demo setup
# and reflects where new Kafka deployments are heading anyway.

services:
  kafka:
    image: confluentinc/cp-kafka:7.6.1
    container_name: fairshare-kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://kafka:29092,CONTROLLER://kafka:9093,PLAINTEXT_HOST://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      CLUSTER_ID: "S0REa0nNTb-mxS_iULz8_Q"
    volumes:
      - kafka-data:/var/lib/kafka/data

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: fairshare-kafka-ui
    depends_on:
      - kafka
    ports:
      - "8090:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092

  postgres-expense:
    image: postgres:16-alpine
    container_name: fairshare-postgres-expense
    environment:
      POSTGRES_DB: expense_db
      POSTGRES_USER: expense_user
      POSTGRES_PASSWORD: expense_pass
    ports:
      - "5433:5432"
    volumes:
      - postgres-expense-data:/var/lib/postgresql/data

  postgres-ledger:
    image: postgres:16-alpine
    container_name: fairshare-postgres-ledger
    environment:
      POSTGRES_DB: ledger_db
      POSTGRES_USER: ledger_user
      POSTGRES_PASSWORD: ledger_pass
    ports:
      - "5434:5432"
    volumes:
      - postgres-ledger-data:/var/lib/postgresql/data

  postgres-settlement:
    image: postgres:16-alpine
    container_name: fairshare-postgres-settlement
    environment:
      POSTGRES_DB: settlement_db
      POSTGRES_USER: settlement_user
      POSTGRES_PASSWORD: settlement_pass
    ports:
      - "5435:5432"
    volumes:
      - postgres-settlement-data:/var/lib/postgresql/data

volumes:
  kafka-data:
  postgres-expense-data:
  postgres-ledger-data:
  postgres-settlement-data:
